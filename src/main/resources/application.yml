spring:
  application:
    name: tarifa-agua

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tarifa_agua}
    username: ${DB_USER:tarifa}
    password: ${DB_PASSWORD:tarifa}

  jpa:
    hibernate:
      # O schema é gerenciado pelo Flyway; o Hibernate apenas valida o mapeamento.
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
